name: Build and Push Docker Image

# El pipeline se activa solo cuando haces un push a la rama 'main'
on:
  push:
    branches:
      - main

# Permisos necesarios para que GitHub Actions pueda guardar la imagen en su propio registro
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. Descarga el código de tu repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Convertimos el nombre del repositorio a minúsculas dinámicamente
      - name: Downcase repository name
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      # 3. Se loguea en el registro de contenedores de GitHub
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Prepara las herramientas de Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Construye la imagen y la sube a GHCR usando la variable en minúsculas
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Usamos env.REPO_LC que ya está garantizado en minúsculas
          tags: ghcr.io/${{ env.REPO_LC }}:latest